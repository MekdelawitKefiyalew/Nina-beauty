<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nina Beauty | Gallery</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background-color: #f8f4fb;
    font-family: 'Segoe UI', sans-serif;
}

h1 {
    color: #c084fc;
    text-align: center;
    margin: 40px 0;
}

.gallery-img {
    border-radius: 15px;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    cursor: pointer;
}

.gallery-img:hover {
    transform: scale(1.05);
    box-shadow: 0 10px 20px rgba(192, 132, 252, 0.3);
}

</style>
</head>
<body>
<!-- Navigation Bar -->
<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
  <div class="container">
    <a class="navbar-brand fw-bold text-purple" href="index.html">
      Nina Beauty ✨
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
      <ul class="navbar-nav">

        <li class="nav-item">
          <a class="nav-link" href="index.html">Home</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="gallery.html">Gallery</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="review.html">Review</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="booking.html">Book Now</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="about.html">About</a>
        </li>

      </ul>
    </div>
  </div>
</nav>
<div class="container">
    <h1>Our Beauty Gallery ✨</h1>

    <div class="row g-4">

        <div class="col-md-4">
            <img src="manicure.jpg" class="img-fluid gallery-img" data-bs-toggle="modal" data-bs-target="#imageModal">
        </div>

        <div class="col-md-4">
            <img src="makeup.jpg" class="img-fluid gallery-img" data-bs-toggle="modal" data-bs-target="#imageModal">
        </div>

        <div class="col-md-4">
            <img src="pedicure.jpg" class="img-fluid gallery-img" data-bs-toggle="modal" data-bs-target="#imageModal">
        </div>
        <div class="col-md-4">
            <img src="sauna.jpg" class="img-fluid gallery-img" data-bs-toggle="modal" data-bs-target="#imageModal">
        </div>
        <div class="col-md-4">
            <img src="spa.jpg" class="img-fluid gallery-img" data-bs-toggle="modal" data-bs-target="#imageModal">
        </div>
        <div class="col-md-4">
            <img src="face.jpg" class="img-fluid gallery-img" data-bs-toggle="modal" data-bs-target="#imageModal">
        </div>
        <div class="col-md-4">
            <img src="henna.jpg" class="img-fluid gallery-img" data-bs-toggle="modal" data-bs-target="#imageModal">
        </div>
        <div class="col-md-4">
            <img src="hair.jpg" class="img-fluid gallery-img" data-bs-toggle="modal" data-bs-target="#imageModal">
        </div>
        <div class="col-md-4">
            <img src="salon.jpg" class="img-fluid gallery-img" data-bs-toggle="modal" data-bs-target="#imageModal">
        </div>
        <div class="col-md-4">
            <img src="massage.jpg" class="img-fluid gallery-img" data-bs-toggle="modal" data-bs-target="#imageModal">
        </div>
        <div class="col-md-4">
            <img src="braid.jpg" class="img-fluid gallery-img" data-bs-toggle="modal" data-bs-target="#imageModal">
        </div>
        <div class="col-md-4">
            <img src="wax.jpg" class="img-fluid gallery-img" data-bs-toggle="modal" data-bs-target="#imageModal">
        </div>

    </div>
</div>

<!-- Modal -->
<div class="modal fade" id="imageModal" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-body text-center">
        <img src="" id="modalImage" class="img-fluid rounded">
      </div>
    </div>
  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
// JavaScript to show clicked image in modal
const images = document.querySelectorAll('.gallery-img');
const modalImage = document.getElementById('modalImage');

images.forEach(img => {
    img.addEventListener('click', function() {
        modalImage.src = this.src;
    });
});
</script>

</body>
</html>
