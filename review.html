<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nina Beauty | Reviews</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background-color: #f8f4fb;
    font-family: 'Segoe UI', sans-serif;
}

h1 {
    text-align: center;
    color: #c084fc;
    margin: 40px 0;
}

.review-card {
    background: white;
    border-radius: 15px;
    padding: 20px;
    box-shadow: 0 5px 15px rgba(192, 132, 252, 0.2);
}

</style>
</head>
<body>
<!-- Navigation Bar -->
<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
  <div class="container">
    <a class="navbar-brand fw-bold text-purple" href="index.html">
      Nina Beauty ✨
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
      <ul class="navbar-nav">

        <li class="nav-item">
          <a class="nav-link" href="index.html">Home</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="gallery.html">Gallery</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="review.html">Review</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="booking.html">Book Now</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="about.html">About</a>
        </li>

      </ul>
    </div>
  </div>
</nav>
<div class="container">

    <h1>Client Reviews 💕</h1>

    <div class="row">
        <div class="col-md-6">
            <div id="reviewsContainer"></div>
        </div>

        <div class="col-md-6">
            <div class="review-card">
                <h4>Add Your Review</h4>

                <input type="text" id="name" class="form-control mb-3" placeholder="Your Name">
                
                <textarea id="reviewText" class="form-control mb-3" placeholder="Write your review"></textarea>

                <select id="rating" class="form-control mb-3">
                    <option value="5">★★★★★</option>
                    <option value="4">★★★★</option>
                    <option value="3">★★★</option>
                    <option value="2">★★</option>
                    <option value="1">★</option>
                </select>

                <button class="btn btn-outline-purple w-100" onclick="addReview()">Submit Review</button>
            </div>
        </div>
    </div>
</div>

<script>
function addReview() {
    const name = document.getElementById('name').value;
    const reviewText = document.getElementById('reviewText').value;
    const rating = document.getElementById('rating').value;

    if(name === "" || reviewText === "") {
        alert("Please fill all fields");
        return;
    }

    const reviewHTML = `
        <div class="review-card mb-3">
            <h5>${name}</h5>
            <p>${reviewText}</p>
            <p>${"★".repeat(rating)}</p>
        </div>
    `;

    document.getElementById('reviewsContainer').innerHTML += reviewHTML;

    document.getElementById('name').value = "";
    document.getElementById('reviewText').value = "";
}
</script>

</body>
</html>
