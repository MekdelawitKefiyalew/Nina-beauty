<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Booking | Nina Beauty</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    font-family:'Poppins', sans-serif;
    background:#fff6f9;
    overflow-x:hidden;
}

/* Background Shapes */
.bg-shape{
    position:fixed;
    border-radius:50%;
    background:rgba(255,182,193,0.25);
    animation: float 8s infinite ease-in-out;
    z-index:-1;
}

.bg-shape:nth-child(1){
    width:300px;
    height:300px;
    top:10%;
    left:10%;
}

.bg-shape:nth-child(2){
    width:250px;
    height:250px;
    bottom:10%;
    right:15%;
    animation-delay:2s;
}

@keyframes float{
    0%{transform:translateY(0px);}
    50%{transform:translateY(-30px);}
    100%{transform:translateY(0px);}
}

/* STEP 1 */
.service-selection{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.service-selection h2{
    font-family:'Playfair Display', serif;
    color:#c2185b;
    margin-bottom:40px;
}

.service-card{
    background:white;
    padding:30px;
    border-radius:25px;
    box-shadow:0 15px 35px rgba(0,0,0,0.08);
    transition:0.4s;
    cursor:pointer;
}

.service-card:hover{
    transform:translateY(-10px);
    box-shadow:0 25px 50px rgba(194,24,91,0.15);
}

/* STEP 2 */
.booking-form{
    display:none;
    min-height:100vh;
    padding:120px 20px;
}

.form-wrapper{
    max-width:700px;
    margin:auto;
    background:white;
    padding:50px;
    border-radius:30px;
    box-shadow:0 20px 50px rgba(194,24,91,0.1);
    animation:fadeUp 0.8s ease;
}

@keyframes fadeUp{
    from{opacity:0; transform:translateY(40px);}
    to{opacity:1; transform:translateY(0);}
}

.form-wrapper h3{
    font-family:'Playfair Display', serif;
    color:#c2185b;
    margin-bottom:30px;
    text-align:center;
}

.form-control, .form-select{
    border-radius:20px;
    padding:12px;
    border:1px solid #f3c6d6;
}

.btn-book{
    background:#c2185b;
    color:white;
    border:none;
    padding:12px 40px;
    border-radius:30px;
    transition:0.3s;
}

.btn-book:hover{
    background:#a3154c;
    transform:translateY(-3px);
}

.back-btn{
    background:none;
    border:none;
    color:#c2185b;
    margin-bottom:20px;
}

/* Toast Styling */
#successToast {
    background: linear-gradient(135deg, #f8b6d2, #f48fb1);
    border-radius: 20px;
    box-shadow: 0 8px 25px rgba(244, 143, 177, 0.4);
    font-weight: 500;
}

.toast {
    animation: slideIn 0.5s ease forwards;
}

@keyframes slideIn {
    from {
        transform: translateX(100%);
        opacity: 0;
    }
    to {
        transform: translateX(0);
        opacity: 1;
    }
}

</style>
</head>

<body>
 <!-- Navigation Bar -->
<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
  <div class="container">
    <a class="navbar-brand fw-bold text-purple" href="index.html">
      Nina Beauty ✨
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
      <ul class="navbar-nav">

        <li class="nav-item">
          <a class="nav-link" href="index.html">Home</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="gallery.html">Gallery</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="review.html">Review</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="booking.html">Book Now</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="about.html">About</a>
        </li>

      </ul>
    </div>
  </div>
</nav>

<!-- Background animation -->
<div class="bg-shape"></div>
<div class="bg-shape"></div>

<!-- STEP 1 -->
<section class="service-selection" id="step1">

    <h2>Select Your Desired Service</h2>

    <div class="container">
        <div class="row g-4 justify-content-center">

            <div class="col-md-4">
                <div class="service-card" onclick="selectService('Hair Styling')">Hair Styling</div>
            </div>

            <div class="col-md-4">
                <div class="service-card" onclick="selectService('Spa Treatment')">Spa Treatment</div>
            </div>

            <div class="col-md-4">
                <div class="service-card" onclick="selectService('Massage')">Massage</div>
            </div>

            <div class="col-md-4">
                <div class="service-card" onclick="selectService('Makeup')">Makeup</div>
            </div>

            <div class="col-md-4">
                <div class="service-card" onclick="selectService('Manicure & Pedicure')">Manicure & Pedicure</div>
            </div>

            <div class="col-md-4">
                <div class="service-card" onclick="selectService('Henna Art')">Henna Art</div>
            </div>

        </div>
    </div>

</section>

<!-- STEP 2 -->
<section class="booking-form" id="step2">

    <div class="form-wrapper">

        <button class="back-btn" onclick="goBack()">← Change Service</button>

        <h3 id="selectedServiceTitle"></h3>

        <form id="bookingForm">

            <div class="mb-3">
                <label>Full Name</label>
                <input type="text" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Phone Number</label>
                <input type="tel" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Select Date</label>
                <input type="date" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Preferred Time</label>
                <select class="form-select">
                    <option>09:00 AM</option>
                    <option>11:00 AM</option>
                    <option>01:00 PM</option>
                    <option>03:00 PM</option>
                    <option>05:00 PM</option>
                </select>
            </div>

            <div class="text-center mt-4">
                <button type="submit" class="btn-book">Confirm Booking</button>
            </div>

        </form>

    </div>

</section>

<!-- Pink Success Toast -->
<div class="position-fixed bottom-0 end-0 p-3" style="z-index: 11">
  <div id="successToast" class="toast border-0" role="alert">
    <div class="d-flex">
      <div class="toast-body text-white">
        🎀 Your appointment has been booked successfully!
      </div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>

<!-- Bootstrap JS (IMPORTANT) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>

function selectService(service){
    document.getElementById("selectedServiceTitle").innerText = service + " Booking";
    document.getElementById("step1").style.display="none";
    document.getElementById("step2").style.display="block";
}

function goBack(){
    document.getElementById("step2").style.display="none";
    document.getElementById("step1").style.display="flex";
}

document.getElementById("bookingForm").addEventListener("submit", function(e){
    e.preventDefault();

    const toastElement = document.getElementById("successToast");
    const toast = new bootstrap.Toast(toastElement);

    toast.show();
    this.reset();

    setTimeout(function(){
        goBack();
    }, 3000);
});

</script>

</body>
</html>
